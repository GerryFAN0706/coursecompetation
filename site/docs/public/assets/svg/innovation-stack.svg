  <rect x="860" y="342" width="420" height="32" rx="16" fill="#059669" fill-opacity="0.08"/>
  <text x="880" y="363" font-size="13" fill="#059669" font-weight="500" font-family="Inter, system-ui, sans-serif">工具链：LLM + 规则模板 + 测试清单 + 教师复核</text>

  <!-- ═══════════ Arrow 2→3 ═══════════ -->
  <line x1="700" y1="512" x2="700" y2="548" stroke="url(#arrow-grad)" stroke-width="3" stroke-opacity="0.6"/>
  <polygon points="688,542 700,560 712,542" fill="#059669" opacity="0.6"/>

