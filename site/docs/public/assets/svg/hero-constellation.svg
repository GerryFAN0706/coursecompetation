<svg width="520" height="520" viewBox="0 0 520 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hg1" x1="0" y1="0" x2="520" y2="520">
      <stop stop-color="#EBF5FF"/>
      <stop offset="0.5" stop-color="#F0FBFF"/>
      <stop offset="1" stop-color="#F5F0FF"/>
    </linearGradient>
    <linearGradient id="hg2" x1="160" y1="120" x2="360" y2="400">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="hg3" x1="100" y1="200" x2="420" y2="320">
      <stop stop-color="#059669"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#2563EB" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="520" rx="32" fill="url(#hg1)"/>

  <!-- Decorative rings -->
  <circle cx="260" cy="260" r="200" stroke="#2563EB" stroke-opacity="0.06" stroke-width="1.5" fill="none"/>
  <circle cx="260" cy="260" r="150" stroke="#0891B2" stroke-opacity="0.08" stroke-width="1" fill="none"/>
  <circle cx="260" cy="260" r="100" stroke="#059669" stroke-opacity="0.06" stroke-width="1" fill="none"/>

  <!-- Connection lines -->
  <line x1="160" y1="160" x2="260" y2="120" stroke="url(#hg2)" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="260" y1="120" x2="380" y2="175" stroke="url(#hg2)" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="160" y1="160" x2="120" y2="280" stroke="url(#hg3)" stroke-width="2" stroke-opacity="0.35"/>
  <line x1="120" y1="280" x2="200" y2="380" stroke="url(#hg3)" stroke-width="2" stroke-opacity="0.35"/>
  <line x1="380" y1="175" x2="400" y2="300" stroke="url(#hg2)" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="400" y1="300" x2="340" y2="390" stroke="url(#hg2)" stroke-width="2" stroke-opacity="0.35"/>
  <line x1="200" y1="380" x2="340" y2="390" stroke="url(#hg3)" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="260" y1="120" x2="260" y2="260" stroke="#2563EB" stroke-width="2" stroke-opacity="0.2"/>
  <line x1="120" y1="280" x2="260" y2="260" stroke="#0891B2" stroke-width="2" stroke-opacity="0.2"/>
  <line x1="400" y1="300" x2="260" y2="260" stroke="#059669" stroke-width="2" stroke-opacity="0.2"/>

  <!-- Center node: AI -->
  <circle cx="260" cy="260" r="52" fill="white" filter="url(#shadow1)"/>
  <circle cx="260" cy="260" r="48" fill="white"/>
  <circle cx="260" cy="260" r="36" fill="url(#hg2)" opacity="0.12"/>
  <text x="260" y="255" text-anchor="middle" font-size="22" font-weight="700" fill="#2563EB" font-family="Inter, system-ui, sans-serif">AI</text>
  <text x="260" y="275" text-anchor="middle" font-size="11" font-weight="500" fill="#64748B" font-family="Inter, system-ui, sans-serif">赋能中枢</text>

  <!-- Top node: 课前 -->
  <circle cx="260" cy="120" r="36" fill="white" filter="url(#shadow1)"/>
  <circle cx="260" cy="120" r="32" fill="white"/>
  <rect x="240" y="104" width="40" height="4" rx="2" fill="#2563EB" opacity="0.6"/>
  <text x="260" y="126" text-anchor="middle" font-size="14" font-weight="600" fill="#1E40AF" font-family="Inter, system-ui, sans-serif">课前</text>
  <text x="260" y="140" text-anchor="middle" font-size="9" fill="#64748B" font-family="Inter, system-ui, sans-serif">学情分析</text>

  <!-- Top-left node: 分层 -->
  <circle cx="160" cy="160" r="30" fill="white" filter="url(#shadow1)"/>
  <circle cx="160" cy="160" r="26" fill="white"/>
  <text x="160" y="164" text-anchor="middle" font-size="12" font-weight="600" fill="#7C3AED" font-family="Inter, system-ui, sans-serif">分层</text>
  <text x="160" y="177" text-anchor="middle" font-size="9" fill="#64748B" font-family="Inter, system-ui, sans-serif">任务生成</text>

  <!-- Top-right node: 审查 -->
  <circle cx="380" cy="175" r="30" fill="white" filter="url(#shadow1)"/>
  <circle cx="380" cy="175" r="26" fill="white"/>
  <text x="380" y="179" text-anchor="middle" font-size="12" font-weight="600" fill="#0891B2" font-family="Inter, system-ui, sans-serif">审查</text>
  <text x="380" y="192" text-anchor="middle" font-size="9" fill="#64748B" font-family="Inter, system-ui, sans-serif">代码诊断</text>

  <!-- Left node: 课中 -->
  <circle cx="120" cy="280" r="36" fill="white" filter="url(#shadow1)"/>
  <circle cx="120" cy="280" r="32" fill="white"/>
  <rect x="100" y="264" width="40" height="4" rx="2" fill="#0891B2" opacity="0.6"/>
  <text x="120" y="286" text-anchor="middle" font-size="14" font-weight="600" fill="#0E7490" font-family="Inter, system-ui, sans-serif">课中</text>
  <text x="120" y="300" text-anchor="middle" font-size="9" fill="#64748B" font-family="Inter, system-ui, sans-serif">人机协同</text>

  <!-- Right node: 验证 -->
  <circle cx="400" cy="300" r="30" fill="white" filter="url(#shadow1)"/>
  <circle cx="400" cy="300" r="26" fill="white"/>
  <text x="400" y="304" text-anchor="middle" font-size="12" font-weight="600" fill="#059669" font-family="Inter, system-ui, sans-serif">验证</text>
  <text x="400" y="317" text-anchor="middle" font-size="9" fill="#64748B" font-family="Inter, system-ui, sans-serif">测试闭环</text>

  <!-- Bottom-left node: 课后 -->
  <circle cx="200" cy="380" r="36" fill="white" filter="url(#shadow1)"/>
  <circle cx="200" cy="380" r="32" fill="white"/>
  <rect x="180" y="364" width="40" height="4" rx="2" fill="#059669" opacity="0.6"/>
  <text x="200" y="386" text-anchor="middle" font-size="14" font-weight="600" fill="#047857" font-family="Inter, system-ui, sans-serif">课后</text>
  <text x="200" y="400" text-anchor="middle" font-size="9" fill="#64748B" font-family="Inter, system-ui, sans-serif">精准干预</text>

  <!-- Bottom-right node: 反馈 -->
  <circle cx="340" cy="390" r="30" fill="white" filter="url(#shadow1)"/>
  <circle cx="340" cy="390" r="26" fill="white"/>
  <text x="340" y="394" text-anchor="middle" font-size="12" font-weight="600" fill="#D97706" font-family="Inter, system-ui, sans-serif">反馈</text>
  <text x="340" y="407" text-anchor="middle" font-size="9" fill="#64748B" font-family="Inter, system-ui, sans-serif">数据驱动</text>

  <!-- Cycle arrow hint (bottom) -->
  <path d="M215 415 Q260 450 305 415" stroke="#059669" stroke-width="1.5" stroke-opacity="0.35" fill="none" stroke-dasharray="4 3"/>
</svg>
