<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="820">
      <stop stop-color="#F0F7FF"/>
      <stop offset="0.5" stop-color="#F5FBFF"/>
      <stop offset="1" stop-color="#F0F0FF"/>
    </linearGradient>
    <linearGradient id="layer1" x1="100" y1="60" x2="1300" y2="220">
      <stop stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="#E0F2FE"/>
    </linearGradient>
    <linearGradient id="layer2" x1="100" y1="280" x2="1300" y2="480">
      <stop stop-color="#D1FAE5"/>
      <stop offset="1" stop-color="#CCFBF1"/>
    </linearGradient>
    <linearGradient id="layer3" x1="100" y1="500" x2="1300" y2="660">
      <stop stop-color="#FEF3C7"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="output-grad" x1="400" y1="700" x2="1000" y2="780">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="card-shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1E40AF" flood-opacity="0.08"/>
    </filter>
    <filter id="icon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="output-shadow" x="-4%" y="-8%" width="108%" height="124%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#2563EB" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="820" rx="28" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <line x1="350" y1="0" x2="350" y2="820" stroke="#CBD5E1" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="700" y1="0" x2="700" y2="820" stroke="#CBD5E1" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="1050" y1="0" x2="1050" y2="820" stroke="#CBD5E1" stroke-opacity="0.15" stroke-width="1"/>

  <!-- ═══════════ LAYER 1: 数据输入层 ═══════════ -->
  <rect x="80" y="50" width="1240" height="190" rx="20" fill="url(#layer1)" stroke="#93C5FD" stroke-width="1.5" filter="url(#card-shadow)"/>

  <!-- Layer 1 accent bar -->
  <rect x="80" y="50" width="8" height="190" rx="4" fill="#2563EB"/>

