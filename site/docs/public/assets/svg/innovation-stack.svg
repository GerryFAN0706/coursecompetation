  <circle cx="140" cy="110" r="28" fill="#2563EB" opacity="0.12"/>
  <text x="140" y="118" text-anchor="middle" font-size="24" fill="#2563EB" font-family="Inter, system-ui, sans-serif">📥</text>

  <!-- Layer 1 title & description -->
  <text x="190" y="108" font-size="28" font-weight="700" fill="#1E3A5F" font-family="Inter, system-ui, sans-serif">数据输入层</text>
  <text x="190" y="140" font-size="17" fill="#475569" font-family="Inter, system-ui, sans-serif">学情数据汇聚 · 多维信息采集 · 实时状态感知</text>

  <!-- Layer 1 sub-items -->
  <rect x="190" y="158" width="160" height="56" rx="12" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <text x="270" y="182" text-anchor="middle" font-size="13" font-weight="600" fill="#2563EB" font-family="Inter, system-ui, sans-serif">作业提交</text>
  <text x="270" y="200" text-anchor="middle" font-size="11" fill="#64748B" font-family="Inter, system-ui, sans-serif">Gitea代码仓库</text>

  <rect x="370" y="158" width="160" height="56" rx="12" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <text x="450" y="182" text-anchor="middle" font-size="13" font-weight="600" fill="#2563EB" font-family="Inter, system-ui, sans-serif">测验成绩</text>
  <text x="450" y="200" text-anchor="middle" font-size="11" fill="#64748B" font-family="Inter, system-ui, sans-serif">课堂测试数据</text>

  <rect x="550" y="158" width="160" height="56" rx="12" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <text x="630" y="182" text-anchor="middle" font-size="13" font-weight="600" fill="#2563EB" font-family="Inter, system-ui, sans-serif">代码审查记录</text>
  <text x="630" y="200" text-anchor="middle" font-size="11" fill="#64748B" font-family="Inter, system-ui, sans-serif">AI + 教师审查日志</text>

  <rect x="730" y="158" width="160" height="56" rx="12" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <text x="810" y="182" text-anchor="middle" font-size="13" font-weight="600" fill="#2563EB" font-family="Inter, system-ui, sans-serif">课堂互动</text>
  <text x="810" y="200" text-anchor="middle" font-size="11" fill="#64748B" font-family="Inter, system-ui, sans-serif">提问·讨论·操作</text>

