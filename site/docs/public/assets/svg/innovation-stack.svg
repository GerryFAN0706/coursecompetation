  <text x="436" y="430" text-anchor="middle" font-size="14" font-weight="600" fill="#059669" font-family="Inter, system-ui, sans-serif">分层任务生成</text>
  <text x="436" y="452" text-anchor="middle" font-size="11" fill="#64748B" font-family="Inter, system-ui, sans-serif">一人一题 · 分级脚手架</text>

  <path d="M530 440 L560 440" stroke="#059669" stroke-width="2" stroke-opacity="0.5"/>
  <polygon points="556,435 568,440 556,445" fill="#059669" opacity="0.5"/>

  <rect x="572" y="400" width="180" height="80" rx="14" fill="white" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="662" y="430" text-anchor="middle" font-size="14" font-weight="600" fill="#059669" font-family="Inter, system-ui, sans-serif">知识点映射</text>
  <text x="662" y="452" text-anchor="middle" font-size="11" fill="#64748B" font-family="Inter, system-ui, sans-serif">缺陷→知识点对照</text>

