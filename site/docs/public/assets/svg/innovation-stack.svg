  <text x="210" y="452" text-anchor="middle" font-size="11" fill="#64748B" font-family="Inter, system-ui, sans-serif">能力分层 · 风险预警</text>

  <path d="M304 440 L334 440" stroke="#059669" stroke-width="2" stroke-opacity="0.5" marker-end="url(#arrowhead)"/>
  <polygon points="330,435 342,440 330,445" fill="#059669" opacity="0.5"/>

