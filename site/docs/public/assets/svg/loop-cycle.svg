<svg width="1400" height="500" viewBox="0 0 1400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lc-bg" x1="0" y1="0" x2="1400" y2="500">
      <stop stop-color="#F0F7FF"/>
      <stop offset="0.5" stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#F0F5FF"/>
    </linearGradient>
    <linearGradient id="lc-blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="lc-teal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0891B2"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="lc-amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D97706"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="lc-loop" x1="200" y1="460" x2="1200" y2="460">
      <stop stop-color="#2563EB"/>
      <stop offset="0.5" stop-color="#0891B2"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <filter id="lc-shadow" x="-4%" y="-6%" width="108%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#1E40AF" flood-opacity="0.1"/>
    </filter>
    <filter id="lc-shadow-teal" x="-4%" y="-6%" width="108%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#0891B2" flood-opacity="0.1"/>
    </filter>
    <filter id="lc-shadow-amber" x="-4%" y="-6%" width="108%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#D97706" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="500" rx="24" fill="url(#lc-bg)"/>

  <!-- Decorative arcs -->
  <circle cx="700" cy="240" r="380" stroke="#2563EB" stroke-opacity="0.04" stroke-width="1.5" fill="none"/>
  <circle cx="700" cy="240" r="320" stroke="#0891B2" stroke-opacity="0.05" stroke-width="1" fill="none"/>

  <!-- ═══════════ CARD 1: 课前 ═══════════ -->
  <g filter="url(#lc-shadow)">
    <rect x="80" y="60" width="360" height="340" rx="20" fill="white" stroke="#DBEAFE" stroke-width="1.5"/>
    <!-- Top accent -->
    <rect x="80" y="60" width="360" height="6" rx="3" fill="url(#lc-blue)"/>
  </g>

  <!-- Phase badge -->
  <rect x="110" y="90" width="72" height="30" rx="15" fill="#2563EB" fill-opacity="0.1"/>
  <text x="146" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#2563EB" font-family="Inter, system-ui, sans-serif">课前</text>

  <!-- Title -->
  <text x="110" y="155" font-size="26" font-weight="700" fill="#1E3A5F" font-family="Inter, system-ui, sans-serif">学情分析与分层</text>

  <!-- Items -->
  <circle cx="122" cy="192" r="6" fill="#2563EB" opacity="0.2"/>
  <circle cx="122" cy="192" r="3" fill="#2563EB"/>
  <text x="140" y="197" font-size="16" fill="#334155" font-family="Inter, system-ui, sans-serif">AI学情聚类分析</text>

  <circle cx="122" cy="228" r="6" fill="#2563EB" opacity="0.2"/>
  <circle cx="122" cy="228" r="3" fill="#2563EB"/>
  <text x="140" y="233" font-size="16" fill="#334155" font-family="Inter, system-ui, sans-serif">分层任务"一人一题"</text>

  <circle cx="122" cy="264" r="6" fill="#2563EB" opacity="0.2"/>
  <circle cx="122" cy="264" r="3" fill="#2563EB"/>
  <text x="140" y="269" font-size="16" fill="#334155" font-family="Inter, system-ui, sans-serif">实验手册与测试清单</text>

  <!-- Metric highlight -->
  <rect x="110" y="300" width="300" height="70" rx="14" fill="#EFF6FF"/>
  <text x="130" y="328" font-size="28" font-weight="700" fill="#2563EB" font-family="Inter, system-ui, sans-serif">+21.2pp</text>
  <text x="130" y="352" font-size="13" fill="#64748B" font-family="Inter, system-ui, sans-serif">首次编译通过率提升</text>

  <!-- ═══════════ ARROW 1→2 ═══════════ -->
  <path d="M444 230 Q490 200 490 230 L490 230 Q490 260 536 230" stroke="#2563EB" stroke-width="2.5" stroke-opacity="0.4" fill="none"/>
  <polygon points="530,224 544,230 530,236" fill="#0891B2" opacity="0.6"/>
  <text x="492" y="208" text-anchor="middle" font-size="11" font-weight="600" fill="#64748B" font-family="Inter, system-ui, sans-serif">推送任务</text>

  <!-- ═══════════ CARD 2: 课中 ═══════════ -->
  <g filter="url(#lc-shadow-teal)">
    <rect x="520" y="60" width="360" height="340" rx="20" fill="white" stroke="#CCFBF1" stroke-width="1.5"/>
    <rect x="520" y="60" width="360" height="6" rx="3" fill="url(#lc-teal)"/>
  </g>

  <!-- Phase badge -->
  <rect x="550" y="90" width="72" height="30" rx="15" fill="#0891B2" fill-opacity="0.1"/>
  <text x="586" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#0891B2" font-family="Inter, system-ui, sans-serif">课中</text>

  <!-- Title -->
  <text x="550" y="155" font-size="26" font-weight="700" fill="#134E4A" font-family="Inter, system-ui, sans-serif">人机协同审查</text>

  <!-- Items -->
  <circle cx="562" cy="192" r="6" fill="#0891B2" opacity="0.2"/>
  <circle cx="562" cy="192" r="3" fill="#0891B2"/>
  <text x="580" y="197" font-size="16" fill="#334155" font-family="Inter, system-ui, sans-serif">AI代码诊断与审查</text>

  <circle cx="562" cy="228" r="6" fill="#0891B2" opacity="0.2"/>
  <circle cx="562" cy="228" r="3" fill="#0891B2"/>
  <text x="580" y="233" font-size="16" fill="#334155" font-family="Inter, system-ui, sans-serif">教师纠偏引导</text>

  <circle cx="562" cy="264" r="6" fill="#0891B2" opacity="0.2"/>
  <circle cx="562" cy="264" r="3" fill="#0891B2"/>
  <text x="580" y="269" font-size="16" fill="#334155" font-family="Inter, system-ui, sans-serif">学生修改与验证闭环</text>

  <!-- Metric highlight -->
  <rect x="550" y="300" width="300" height="70" rx="14" fill="#F0FDFA"/>
  <text x="570" y="328" font-size="28" font-weight="700" fill="#0891B2" font-family="Inter, system-ui, sans-serif">-63.7%</text>
  <text x="570" y="352" font-size="13" fill="#64748B" font-family="Inter, system-ui, sans-serif">教师审查时间节约</text>

  <!-- ═══════════ ARROW 2→3 ═══════════ -->
  <path d="M884 230 Q930 200 930 230 L930 230 Q930 260 976 230" stroke="#0891B2" stroke-width="2.5" stroke-opacity="0.4" fill="none"/>
  <polygon points="970,224 984,230 970,236" fill="#D97706" opacity="0.6"/>
  <text x="932" y="208" text-anchor="middle" font-size="11" font-weight="600" fill="#64748B" font-family="Inter, system-ui, sans-serif">采集数据</text>

  <!-- ═══════════ CARD 3: 课后 ═══════════ -->
  <g filter="url(#lc-shadow-amber)">
    <rect x="960" y="60" width="360" height="340" rx="20" fill="white" stroke="#FEF3C7" stroke-width="1.5"/>
    <rect x="960" y="60" width="360" height="6" rx="3" fill="url(#lc-amber)"/>
  </g>

  <!-- Phase badge -->
  <rect x="990" y="90" width="72" height="30" rx="15" fill="#D97706" fill-opacity="0.1"/>
  <text x="1026" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#D97706" font-family="Inter, system-ui, sans-serif">课后</text>

  <!-- Title -->
  <text x="990" y="155" font-size="26" font-weight="700" fill="#78350F" font-family="Inter, system-ui, sans-serif">精准干预反馈</text>

  <!-- Items -->
  <circle cx="1002" cy="192" r="6" fill="#D97706" opacity="0.2"/>
  <circle cx="1002" cy="192" r="3" fill="#D97706"/>
  <text x="1020" y="197" font-size="16" fill="#334155" font-family="Inter, system-ui, sans-serif">智能反馈报告生成</text>

  <circle cx="1002" cy="228" r="6" fill="#D97706" opacity="0.2"/>
  <circle cx="1002" cy="228" r="3" fill="#D97706"/>
  <text x="1020" y="233" font-size="16" fill="#334155" font-family="Inter, system-ui, sans-serif">个性化学习建议</text>

  <circle cx="1002" cy="264" r="6" fill="#D97706" opacity="0.2"/>
  <circle cx="1002" cy="264" r="3" fill="#D97706"/>
  <text x="1020" y="269" font-size="16" fill="#334155" font-family="Inter, system-ui, sans-serif">教师精准干预方案</text>

  <!-- Metric highlight -->
  <rect x="990" y="300" width="300" height="70" rx="14" fill="#FFFBEB"/>
  <text x="1010" y="328" font-size="28" font-weight="700" fill="#D97706" font-family="Inter, system-ui, sans-serif">+23.1pp</text>
  <text x="1010" y="352" font-size="13" fill="#64748B" font-family="Inter, system-ui, sans-serif">优良率提升（35.5%→58.6%）</text>

  <!-- ═══════════ BOTTOM LOOP BAR ═══════════ -->
  <path d="M260 420 Q260 462 350 462 L1050 462 Q1140 462 1140 420" stroke="url(#lc-loop)" stroke-width="2" stroke-opacity="0.4" fill="none" stroke-dasharray="8 4"/>

  <!-- Loop arrow back to 课前 -->
  <path d="M260 420 L260 408" stroke="#2563EB" stroke-width="2" stroke-opacity="0.4"/>
  <polygon points="254,412 260,400 266,412" fill="#2563EB" opacity="0.4"/>

  <!-- Loop label -->
  <rect x="560" y="442" width="280" height="36" rx="18" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="700" y="466" text-anchor="middle" font-size="14" font-weight="600" fill="#475569" font-family="Inter, system-ui, sans-serif">数据驱动 · 持续迭代 · 教学闭环</text>
</svg>