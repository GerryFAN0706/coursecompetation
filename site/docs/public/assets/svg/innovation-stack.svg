  <polygon points="782,435 794,440 782,445" fill="#059669" opacity="0.5"/>

  <rect x="798" y="400" width="180" height="80" rx="14" fill="white" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="888" y="430" text-anchor="middle" font-size="14" font-weight="600" fill="#059669" font-family="Inter, system-ui, sans-serif">风险识别</text>
  <text x="888" y="452" text-anchor="middle" font-size="11" fill="#64748B" font-family="Inter, system-ui, sans-serif">安全漏洞 · 代码异味</text>

  <path d="M982 440 L1012 440" stroke="#059669" stroke-width="2" stroke-opacity="0.5"/>
  <polygon points="1008,435 1020,440 1008,445" fill="#059669" opacity="0.5"/>

  <rect x="1024" y="400" width="180" height="80" rx="14" fill="white" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="1114" y="430" text-anchor="middle" font-size="14" font-weight="600" fill="#059669" font-family="Inter, system-ui, sans-serif">反馈生成</text>
  <text x="1114" y="452" text-anchor="middle" font-size="11" fill="#64748B" font-family="Inter, system-ui, sans-serif">个性化报告输出</text>

