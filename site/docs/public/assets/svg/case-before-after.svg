<svg width="1400" height="560" viewBox="0 0 1400 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ba-bg" x1="0" y1="0" x2="1400" y2="560">
      <stop stop-color="#FEF8F7"/>
      <stop offset="0.5" stop-color="#FAFCFF"/>
      <stop offset="1" stop-color="#F0FDF4"/>
    </linearGradient>
    <linearGradient id="ba-red" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EF4444"/>
      <stop offset="1" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="ba-green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#059669"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="ba-arrow" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#DC2626"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="ba-shadow" x="-4%" y="-6%" width="108%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="560" rx="24" fill="url(#ba-bg)"/>

  <!-- ═══ LEFT: 修复前 ═══ -->
  <g filter="url(#ba-shadow)">
    <rect x="60" y="50" width="580" height="460" rx="20" fill="white" stroke="#FECACA" stroke-width="1.5"/>
    <rect x="60" y="50" width="580" height="6" rx="3" fill="url(#ba-red)"/>
  </g>

  <!-- Header -->
  <rect x="90" y="80" width="100" height="30" rx="15" fill="#FEE2E2"/>
  <text x="140" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#DC2626" font-family="Inter, system-ui, sans-serif">修复前</text>
  <text x="200" y="100" font-size="14" fill="#94A3B8" font-family="Inter, system-ui, sans-serif">问题版工程</text>

  <!-- Issue cards -->
  <rect x="90" y="130" width="520" height="72" rx="12" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <circle cx="120" cy="166" r="14" fill="#DC2626" opacity="0.12"/>
  <text x="120" y="171" text-anchor="middle" font-size="14" font-weight="700" fill="#DC2626" font-family="Inter, system-ui, sans-serif">1</text>
  <text x="148" y="157" font-size="15" font-weight="600" fill="#991B1B" font-family="Inter, system-ui, sans-serif">认证与授权混淆</text>
  <text x="148" y="179" font-size="13" fill="#7F1D1D" font-family="Inter, system-ui, sans-serif">RoleBasedAuthFilter 只判断登录，不判断 ADMIN 角色</text>

  <rect x="90" y="218" width="520" height="72" rx="12" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <circle cx="120" cy="254" r="14" fill="#DC2626" opacity="0.12"/>
  <text x="120" y="259" text-anchor="middle" font-size="14" font-weight="700" fill="#DC2626" font-family="Inter, system-ui, sans-serif">2</text>
  <text x="148" y="245" font-size="15" font-weight="600" fill="#991B1B" font-family="Inter, system-ui, sans-serif">视图与授权不一致</text>
  <text x="148" y="267" font-size="13" fill="#7F1D1D" font-family="Inter, system-ui, sans-serif">登录后统一显示"管理后台"入口，USER 可见不该见的菜单</text>

  <rect x="90" y="306" width="520" height="72" rx="12" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <circle cx="120" cy="342" r="14" fill="#DC2626" opacity="0.12"/>
  <text x="120" y="347" text-anchor="middle" font-size="14" font-weight="700" fill="#DC2626" font-family="Inter, system-ui, sans-serif">3</text>
  <text x="148" y="333" font-size="15" font-weight="600" fill="#991B1B" font-family="Inter, system-ui, sans-serif">会话失效不彻底</text>
  <text x="148" y="355" font-size="13" fill="#7F1D1D" font-family="Inter, system-ui, sans-serif">LogoutServlet 仅 removeAttribute，会话残留导致幽灵登录</text>

  <!-- Risk summary -->
  <rect x="90" y="410" width="520" height="70" rx="14" fill="#FEE2E2"/>
  <text x="350" y="440" text-anchor="middle" font-size="16" font-weight="700" fill="#DC2626" font-family="Inter, system-ui, sans-serif">风险：认证 ≠ 授权，权限边界不可控</text>
  <text x="350" y="462" text-anchor="middle" font-size="12" fill="#991B1B" font-family="Inter, system-ui, sans-serif">USER 可越权访问 /admin/panel，退出后仍可复用旧会话</text>

  <!-- ═══ CENTER ARROW ═══ -->
  <rect x="665" y="230" width="70" height="70" rx="35" fill="white" filter="url(#ba-shadow)"/>
  <path d="M685 265 L715 265" stroke="url(#ba-arrow)" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="712,256 726,265 712,274" fill="#059669"/>
  <text x="700" y="325" text-anchor="middle" font-size="11" font-weight="600" fill="#64748B" font-family="Inter, system-ui, sans-serif">课堂修复</text>

  <!-- ═══ RIGHT: 修复后 ═══ -->
  <g filter="url(#ba-shadow)">
    <rect x="760" y="50" width="580" height="460" rx="20" fill="white" stroke="#A7F3D0" stroke-width="1.5"/>
    <rect x="760" y="50" width="580" height="6" rx="3" fill="url(#ba-green)"/>
  </g>

  <!-- Header -->
  <rect x="790" y="80" width="100" height="30" rx="15" fill="#D1FAE5"/>
  <text x="840" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#059669" font-family="Inter, system-ui, sans-serif">修复后</text>
  <text x="900" y="100" font-size="14" fill="#94A3B8" font-family="Inter, system-ui, sans-serif">课堂目标达成</text>

  <!-- Fixed cards -->
  <rect x="790" y="130" width="520" height="60" rx="12" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <circle cx="820" cy="160" r="14" fill="#059669" opacity="0.12"/>
  <text x="820" y="165" text-anchor="middle" font-size="14" font-weight="700" fill="#059669" font-family="Inter, system-ui, sans-serif">✓</text>
  <text x="848" y="155" font-size="15" font-weight="600" fill="#166534" font-family="Inter, system-ui, sans-serif">未登录访问后台 → 被 Filter 拦截</text>
  <text x="848" y="173" font-size="12" fill="#15803D" font-family="Inter, system-ui, sans-serif">认证检查通过</text>

  <rect x="790" y="204" width="520" height="60" rx="12" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <circle cx="820" cy="234" r="14" fill="#059669" opacity="0.12"/>
  <text x="820" y="239" text-anchor="middle" font-size="14" font-weight="700" fill="#059669" font-family="Inter, system-ui, sans-serif">✓</text>
  <text x="848" y="229" font-size="15" font-weight="600" fill="#166534" font-family="Inter, system-ui, sans-serif">USER 访问 /admin/panel → 403 拒绝</text>
  <text x="848" y="247" font-size="12" fill="#15803D" font-family="Inter, system-ui, sans-serif">授权检查通过（RBAC 最小闭环）</text>

  <rect x="790" y="278" width="520" height="60" rx="12" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <circle cx="820" cy="308" r="14" fill="#059669" opacity="0.12"/>
  <text x="820" y="313" text-anchor="middle" font-size="14" font-weight="700" fill="#059669" font-family="Inter, system-ui, sans-serif">✓</text>
  <text x="848" y="303" font-size="15" font-weight="600" fill="#166534" font-family="Inter, system-ui, sans-serif">ADMIN 访问 /admin/panel → 正常放行</text>
  <text x="848" y="321" font-size="12" fill="#15803D" font-family="Inter, system-ui, sans-serif">角色判定正确</text>

  <rect x="790" y="352" width="520" height="60" rx="12" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <circle cx="820" cy="382" r="14" fill="#059669" opacity="0.12"/>
  <text x="820" y="387" text-anchor="middle" font-size="14" font-weight="700" fill="#059669" font-family="Inter, system-ui, sans-serif">✓</text>
  <text x="848" y="377" font-size="15" font-weight="600" fill="#166534" font-family="Inter, system-ui, sans-serif">登出后再访问 → 被再次拦截</text>
  <text x="848" y="395" font-size="12" fill="#15803D" font-family="Inter, system-ui, sans-serif">session.invalidate() 彻底清除会话</text>

  <!-- Success summary -->
  <rect x="790" y="430" width="520" height="50" rx="14" fill="#D1FAE5"/>
  <text x="1050" y="462" text-anchor="middle" font-size="16" font-weight="700" fill="#059669" font-family="Inter, system-ui, sans-serif">结果：权限边界可验证，RBAC 闭环完整</text>
</svg>