<h2 id="filter%E6%9D%83%E9%99%90%E6%A3%80%E6%9F%A5--%E6%A0%B8%E5%BF%83%E8%AE%B2%E8%A7%A3">Filter权限检查 · 核心讲解</h2>
<h6 id="role-based-auth-filter--key-explanation">Role-Based Auth Filter · Key Explanation</h6>
<p><strong>修复方案——基于角色的Filter</strong> <em>Role-based filter</em>:</p>
<pre><code class="language-java"><span class="hljs-meta">@WebFilter(&quot;/admin/*&quot;)</span>
<span class="hljs-keyword">public</span> <span class="hljs-keyword">class</span> <span class="hljs-title class_">RoleBasedAuthFilter</span> <span class="hljs-keyword">implements</span> <span class="hljs-title class_">Filter</span> {
    <span class="hljs-keyword">public</span> <span class="hljs-keyword">void</span> <span class="hljs-title function_">doFilter</span><span class="hljs-params">(ServletRequest req, ServletResponse res, FilterChain chain)</span>
            <span class="hljs-keyword">throws</span> IOException, ServletException {
        <span class="hljs-type">HttpServletRequest</span> <span class="hljs-variable">request</span> <span class="hljs-operator">=</span> (HttpServletRequest) req;
        <span class="hljs-type">HttpServletResponse</span> <span class="hljs-variable">response</span> <span class="hljs-operator">=</span> (HttpServletResponse) res;
        <span class="hljs-type">HttpSession</span> <span class="hljs-variable">session</span> <span class="hljs-operator">=</span> request.getSession(<span class="hljs-literal">false</span>);
        <span class="hljs-keyword">if</span> (session == <span class="hljs-literal">null</span>) {
            response.sendRedirect(request.getContextPath() + <span class="hljs-string">&quot;/login.jsp&quot;</span>);
            <span class="hljs-keyword">return</span>;
        }
        <span class="hljs-type">User</span> <span class="hljs-variable">user</span> <span class="hljs-operator">=</span> (User) session.getAttribute(<span class="hljs-string">&quot;user&quot;</span>);
        <span class="hljs-keyword">if</span> (user != <span class="hljs-literal">null</span> &amp;&amp; <span class="hljs-string">&quot;ADMIN&quot;</span>.equals(user.getRole())) {
            chain.doFilter(req, res);   <span class="hljs-comment">// ADMIN放行</span>
        } <span class="hljs-keyword">else</span> <span class="hljs-keyword">if</span> (user != <span class="hljs-literal">null</span>) {
            response.sendError(<span class="hljs-number">403</span>);    <span class="hljs-comment">// 非ADMIN → 403</span>
        } <span class="hljs-keyword">else</span> {
            response.sendRedirect(request.getContextPath() + <span class="hljs-string">&quot;/login.jsp&quot;</span>);
        }
    }
}
</code></pre>
<p><strong>关键</strong>: 不是检查&quot;是否登录&quot;，而是检查&quot;角色是否匹配&quot;！</p>

<h2 id="%E8%AE%A4%E8%AF%81%E4%B8%8E%E6%8E%88%E6%9D%83">认证与授权</h2>
<h6 id="authentication--authorization">Authentication &amp; Authorization</h6>
<p><strong>两个不同的概念 (Two Different Concepts)</strong>:</p>
<div class="ldiv">
<p><strong>认证 (Authentication)</strong></p>
<p><strong>问题</strong>: 你是谁？<br />
<em>Who are you?</em></p>
<p><strong>过程</strong>:</p>
<ul>
<li>用户提供凭证（用户名+密码）</li>
<li>系统验证身份</li>
<li>确认用户身份</li>
</ul>
<p><strong>比喻</strong>: 身份证检查<br />
<em>ID verification</em></p>
</div>
<div class="rdiv">
<p><strong>授权 (Authorization)</strong></p>
<p><strong>问题</strong>: 你能做什么？<br />
<em>What can you do?</em></p>
<p><strong>过程</strong>:</p>
<ul>
<li>检查用户角色/权限</li>
<li>判断是否有访问权限</li>
<li>允许或拒绝访问</li>
</ul>
<p><strong>比喻</strong>: 门禁卡权限<br />
<em>Access card permission</em></p>
</div>
<p><strong>顺序</strong>: 先认证，后授权 | <strong>核心</strong>: 登录成功 ≠ 拥有所有权限</p>

<h2 id="%E7%99%BB%E5%87%BA%E4%B8%8Esession%E5%AE%89%E5%85%A8">登出与Session安全</h2>
<p><strong>安全登出 (Secure Logout)</strong>:</p>
<pre><code class="language-java"><span class="hljs-meta">@WebServlet(&quot;/logout&quot;)</span>
<span class="hljs-keyword">public</span> <span class="hljs-keyword">class</span> <span class="hljs-title class_">LogoutServlet</span> <span class="hljs-keyword">extends</span> <span class="hljs-title class_">HttpServlet</span> {
    <span class="hljs-keyword">protected</span> <span class="hljs-keyword">void</span> <span class="hljs-title function_">doGet</span><span class="hljs-params">(HttpServletRequest req, HttpServletResponse resp)</span>
            <span class="hljs-keyword">throws</span> IOException {
        <span class="hljs-type">HttpSession</span> <span class="hljs-variable">session</span> <span class="hljs-operator">=</span> req.getSession(<span class="hljs-literal">false</span>);
        <span class="hljs-keyword">if</span> (session != <span class="hljs-literal">null</span>) {
            session.invalidate();  <span class="hljs-comment">// 彻底销毁Session</span>
        }
        resp.sendRedirect(req.getContextPath() + <span class="hljs-string">&quot;/login.jsp&quot;</span>);
        }}
</code></pre>
<p><strong>关键区别 (Key Difference)</strong>:</p>
<ul>
<li><code>removeAttribute(&quot;user&quot;)</code> — 只删一个属性，Session仍存活</li>
<li><code>invalidate()</code> — <strong>彻底销毁</strong>整个Session，所有属性一并清除</li>
</ul>

<pre><code class="language-jsp">&lt;%@ taglib prefix=<span class="hljs-string">&quot;c&quot;</span> uri=<span class="hljs-string">&quot;http://java.sun.com/jsp/jstl/core&quot;</span> %&gt;

<h6 id="authorization-filter-fixed">Authorization Filter (Fixed)</h6>
<p><strong>基于角色的Filter</strong> <em>Role-based filter</em></p>
<pre><code class="language-java"><span class="hljs-meta">@WebFilter(&quot;/admin/*&quot;)</span>
<span class="hljs-keyword">public</span> <span class="hljs-keyword">class</span> <span class="hljs-title class_">RoleBasedAuthFilter</span> <span class="hljs-keyword">implements</span> <span class="hljs-title class_">Filter</span> {
    <span class="hljs-keyword">public</span> <span class="hljs-keyword">void</span> <span class="hljs-title function_">doFilter</span><span class="hljs-params">(ServletRequest req, ServletResponse res, FilterChain chain)</span>
            <span class="hljs-keyword">throws</span> IOException, ServletException {
        <span class="hljs-type">HttpServletRequest</span> <span class="hljs-variable">request</span> <span class="hljs-operator">=</span> (HttpServletRequest) req;
        <span class="hljs-type">HttpServletResponse</span> <span class="hljs-variable">response</span> <span class="hljs-operator">=</span> (HttpServletResponse) res;
        <span class="hljs-type">HttpSession</span> <span class="hljs-variable">session</span> <span class="hljs-operator">=</span> request.getSession(<span class="hljs-literal">false</span>);
        <span class="hljs-keyword">if</span> (session == <span class="hljs-literal">null</span>) {
            response.sendRedirect(request.getContextPath() + <span class="hljs-string">&quot;/login.jsp&quot;</span>);
            <span class="hljs-keyword">return</span>;
        }
        <span class="hljs-type">User</span> <span class="hljs-variable">user</span> <span class="hljs-operator">=</span> (User) session.getAttribute(<span class="hljs-string">&quot;user&quot;</span>);
        <span class="hljs-keyword">if</span> (user != <span class="hljs-literal">null</span> &amp;&amp; <span class="hljs-string">&quot;ADMIN&quot;</span>.equals(user.getRole())) {
            chain.doFilter(req, res);   <span class="hljs-comment">// ADMIN放行</span>
        } <span class="hljs-keyword">else</span> <span class="hljs-keyword">if</span> (user != <span class="hljs-literal">null</span>) {
            response.sendError(<span class="hljs-number">403</span>);    <span class="hljs-comment">// 非ADMIN → 403</span>
        } <span class="hljs-keyword">else</span> {
            response.sendRedirect(request.getContextPath() + <span class="hljs-string">&quot;/login.jsp&quot;</span>);
        }
    }
}
</code></pre>

<h2 id="%E4%B8%89%E4%B8%AA%E6%A0%B8%E5%BF%83%E6%94%B6%E8%8E%B7">三个核心收获</h2>
<h6 id="three-key-takeaways">Three Key Takeaways</h6>
<p><strong>今天的三个核心收获 (Three Key Takeaways)</strong>:</p>
<div class="flex-row">
<div>
<p><strong>1. 认证回答&quot;你是谁&quot;，授权回答&quot;你能做什么&quot;</strong></p>
<ul>
<li>Authentication ≠ Authorization</li>
<li>登录成功 ≠ 拥有所有权限</li>
</ul>
<p><strong>2. RBAC + Filter = 后端权限控制的基本骨架</strong></p>
<ul>
<li>Filter是安全的第一道防线</li>
<li>前端隐藏 + 后端控制 = 完整方案</li>
</ul>
</div>
<div>
<p><strong>3.</strong> <span class="ai-badge">AI辅助</span> <strong>人机协同 &gt; 单独任何一方</strong></p>
<ul>
<li>AI发现了Cache-Control问题，但也产生了1个误报</li>
<li>WebSec闯关让每个人都亲手修复了漏洞</li>
<li>批判性判断 &gt; 盲目采纳</li>
</ul>
</div>
</div>
