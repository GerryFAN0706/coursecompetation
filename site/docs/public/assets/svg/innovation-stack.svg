  <text x="568" y="618" font-size="12" fill="#78350F" font-family="Inter, system-ui, sans-serif">分层任务推送</text>

  <path d="M764 606 L788 606" stroke="#D97706" stroke-width="2" stroke-opacity="0.5"/>
  <polygon points="784,601 796,606 784,611" fill="#D97706" opacity="0.5"/>

  <rect x="800" y="580" width="200" height="52" rx="10" fill="white" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="808" y="595" font-size="11" font-weight="700" fill="#D97706" font-family="Inter, system-ui, sans-serif">课中</text>
  <text x="808" y="618" font-size="12" fill="#78350F" font-family="Inter, system-ui, sans-serif">诊断 → 修复 → 验证</text>

  <path d="M1004 606 L1028 606" stroke="#D97706" stroke-width="2" stroke-opacity="0.5"/>
  <polygon points="1024,601 1036,606 1024,611" fill="#D97706" opacity="0.5"/>

  <rect x="1040" y="580" width="200" height="52" rx="10" fill="white" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="1048" y="595" font-size="11" font-weight="700" fill="#D97706" font-family="Inter, system-ui, sans-serif">课后</text>
  <text x="1048" y="618" font-size="12" fill="#78350F" font-family="Inter, system-ui, sans-serif">反馈迭代 · 精准干预</text>

  <!-- Layer 3 feedback loop arrow (课后→课前) -->
  <path d="M1140 636 Q1140 670 900 670 Q560 670 560 636" stroke="#D97706" stroke-width="1.5" stroke-opacity="0.35" fill="none" stroke-dasharray="6 4"/>
  <polygon points="555,640 560,628 565,640" fill="#D97706" opacity="0.35"/>
  <text x="850" y="684" text-anchor="middle" font-size="11" fill="#D97706" font-opacity="0.6" font-family="Inter, system-ui, sans-serif">教学迭代闭环</text>

  <!-- ═══════════ Arrow 3→Output ═══════════ -->
  <line x1="700" y1="702" x2="700" y2="726" stroke="url(#arrow-grad)" stroke-width="3" stroke-opacity="0.6"/>
  <polygon points="688,720 700,738 712,720" fill="#2563EB" opacity="0.6"/>

  <!-- ═══════════ OUTPUT BAR ═══════════ -->
  <rect x="340" y="740" width="720" height="56" rx="28" fill="url(#output-grad)" filter="url(#output-shadow)"/>
  <text x="700" y="775" text-anchor="middle" font-size="20" font-weight="600" fill="white" font-family="Inter, system-ui, sans-serif">闭环输出：可验证成效 + 可复制模式</text>

  <!-- Side decorative elements -->
  <circle cx="1340" cy="150" r="60" fill="#2563EB" opacity="0.03"/>
  <circle cx="1340" cy="150" r="40" fill="#2563EB" opacity="0.04"/>
  <circle cx="60" cy="650" r="50" fill="#D97706" opacity="0.03"/>
  <circle cx="60" cy="650" r="30" fill="#D97706" opacity="0.04"/>
</svg>