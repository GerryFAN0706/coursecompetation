  <line x1="700" y1="242" x2="700" y2="278" stroke="url(#arrow-grad)" stroke-width="3" stroke-opacity="0.6"/>
  <polygon points="688,272 700,290 712,272" fill="#2563EB" opacity="0.6"/>

